<!DOCTYPE html>
<head>
<title>a door has opened</title>
</head>
<body style="background-color: black; padding-left: 5px; padding-right: 5px;">
  <style>  .chromatic-text {
            font-size: 1.3em; /* Adjust as needed */
            color: #000000; /* Base text color */
            text-shadow: 
                2px 0 0 rgba(255, 0, 0, 0.3), /* Red shadow, slightly offset right */
                -2px 0 0 rgba(0, 255, 0, 0.3), /* Green shadow, slightly offset left */
                0 2px 0 rgba(0, 0, 255, 0.3); /* Blue shadow, slightly offset down */
            position: relative; /* Needed for animation if you add it */
            }
  </style>
<div style="background-color: blue; padding-top: 300px; padding-bottom: 300px;" class="container">
<center>
<p class="chromatic-text" style="font-size:34px;"> a door has opened </p>
</center>
</div>
</body>
</html>
